name: CI Pipeline
on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: Code-Qualität
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Node.js Setup
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Dependencies installieren
        run: npm ci

      - name: ESLint
        run: npm run lint

      - name: TypeScript Prüfung
        run: npm run typecheck

      - name: Prettier Prüfung
        run: npx prettier --check "src/**/*.{ts,tsx,js,jsx,json,css,md}"

      - name: Build
        run: npm run build

  test:
    name: Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Node.js Setup
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Dependencies installieren
        run: npm ci

      - name: Unit-Tests mit Coverage
        run: npm run test:coverage

      - name: Coverage hochladen
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage/
